<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>539 分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f2f7;--bg2:#ffffff;--bg3:#e5e5ea;--bg4:#f2f2f7;
  --sep:rgba(60,60,67,0.18);--sep2:rgba(60,60,67,0.08);
  --label:#000000;--label2:rgba(60,60,67,0.72);--label3:rgba(60,60,67,0.48);--label4:rgba(60,60,67,0.26);
  --blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;
  --yellow:#ffcc00;--purple:#af52de;--teal:#5ac8fa;--indigo:#5856d6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:17px}
body{background:var(--bg);color:var(--label);font-family:'Noto Sans TC',-apple-system,'Helvetica Neue',sans-serif;padding:0 0 60px;min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr-zone{background:rgba(255,255,255,0.88);border-bottom:1px solid var(--sep2);padding:52px 20px 22px;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.hdr-eyebrow{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:5px}
h1.hdr{font-size:clamp(26px,6.5vw,38px);font-weight:900;letter-spacing:-1px;color:var(--label);line-height:1.1;margin-bottom:5px}
.hdr-sub{font-size:14px;color:var(--label3);font-weight:500}
.latest-card{margin:16px 16px 0;background:var(--blue);border-radius:22px;padding:20px 22px 18px;box-shadow:0 8px 24px rgba(0,122,255,0.30);color:#fff}
.latest-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.latest-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.75}
.latest-date{font-size:14px;font-weight:700;opacity:.9}
.latest-balls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.tail-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tail-label{font-size:13px;opacity:.7;font-weight:600}
.tab-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 0;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tab-bar{display:flex;gap:8px;width:max-content;padding-bottom:14px}
.tab-bar button{height:40px;padding:0 18px;border-radius:20px;border:none;background:var(--bg2);color:var(--label2);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',-apple-system,sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.10);transition:all .18s ease}
.tab-bar button:active{transform:scale(.96)}
.tab-bar button.on{background:var(--blue);color:#fff;box-shadow:0 4px 12px rgba(0,122,255,.35)}
.section-hdr{padding:22px 20px 8px;font-size:13px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:1.5px}
.card{margin:0 16px 14px;background:var(--bg2);border-radius:20px;box-shadow:0 1px 3px rgba(0,0,0,.10);overflow:hidden}
.card-hd{padding:18px 20px 14px;border-bottom:1px solid var(--sep2)}
.card-hd h3{font-size:19px;font-weight:800;color:var(--label);letter-spacing:-.3px}
.card-hd p{font-size:14px;color:var(--label3);margin-top:4px;line-height:1.4}
.card-bd{padding:16px 20px}
.ball{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;font-weight:800;font-family:'Noto Sans TC',-apple-system,sans-serif;letter-spacing:-.5px}
.bar-track{background:var(--bg3);border-radius:999px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.rank-num{width:28px;font-size:15px;font-weight:800;text-align:right;flex-shrink:0;color:var(--label3)}
.rank-1{color:#b8860b!important}.rank-2{color:#636366!important}.rank-3{color:#7d5a3c!important}
.medal-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.medal-card{flex:1;min-width:90px;max-width:120px;background:var(--bg);border-radius:18px;padding:20px 12px 14px;text-align:center;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.10)}
.medal-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;white-space:nowrap;color:#fff}
.pool-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pool-group{flex:1;min-width:130px;background:var(--bg);border-radius:14px;padding:12px 14px}
.pool-label{font-size:14px;font-weight:700;margin-bottom:8px}
.pool-balls{display:flex;gap:5px;flex-wrap:wrap}
.tbl-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--sep2)}
table{width:100%;border-collapse:collapse;font-size:15px}
th{padding:11px 10px;text-align:center;color:var(--label3);font-size:13px;font-weight:700;background:var(--bg4);border-bottom:1px solid var(--sep2);letter-spacing:.5px}
td{padding:13px 10px;text-align:center;border-bottom:1px solid var(--sep2);font-size:16px;font-weight:600}
tr:last-child td{border-bottom:none}
tr.hl{background:rgba(255,204,0,.10)}
tr.hl td{font-weight:900;font-size:17px}
.inp{background:var(--bg);border:1.5px solid var(--sep);border-radius:12px;padding:13px 16px;color:var(--label);font-size:17px;font-family:'Noto Sans TC',-apple-system,sans-serif;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,122,255,.15)}
.inp-num{width:58px;border-radius:14px;padding:14px 0;font-size:20px;font-weight:800;text-align:center}
.btn-primary{display:block;width:100%;max-width:320px;margin:0 auto;background:var(--blue);border:none;border-radius:14px;padding:16px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',-apple-system,sans-serif;transition:all .15s;box-shadow:0 4px 16px rgba(0,122,255,.28);letter-spacing:.3px}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-green{background:var(--green);box-shadow:0 4px 16px rgba(52,199,89,.28)}
.btn-tab-add{background:var(--green);border:none;border-radius:14px;padding:15px 32px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',-apple-system,sans-serif;box-shadow:0 4px 16px rgba(52,199,89,.28);transition:all .15s}
.btn-tab-add:active{transform:scale(.97)}
.btn-gap{padding:9px 18px;border-radius:20px;border:1.5px solid var(--sep);background:var(--bg2);color:var(--label2);cursor:pointer;font-weight:700;font-size:15px;font-family:'Noto Sans TC',-apple-system,sans-serif;transition:all .15s}
.btn-gap.on{border-color:var(--orange);background:rgba(255,149,0,.12);color:var(--orange)}
.btn-reset{background:var(--bg3);border:none;border-radius:12px;padding:13px 26px;color:var(--label2);font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',-apple-system,sans-serif;transition:all .15s}
.btn-del{background:rgba(255,59,48,.10);border:none;border-radius:10px;padding:8px 16px;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',-apple-system,sans-serif;flex-shrink:0}
.msg{margin-top:10px;padding:14px 16px;border-radius:12px;font-size:16px;font-weight:600;line-height:1.4}
.msg.ok{background:rgba(52,199,89,.12);color:#1a6e33}
.msg.err{background:rgba(255,59,48,.10);color:#c0281e}
.msg.info{background:rgba(0,122,255,.10);color:#0051a8}
.num-chip{border-radius:8px;padding:4px 10px;font-weight:800;font-size:15px}
.stat-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:8px 16px;font-size:14px;color:var(--label2);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.10)}
.stat-val{color:var(--label);font-weight:900;font-size:16px}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 20px;border-bottom:1px solid var(--sep2);flex-wrap:wrap}
.list-row:last-child{border-bottom:none}
.footer{text-align:center;padding:28px 20px 12px;font-size:13px;color:var(--label4);line-height:1.6}
.field-label{font-size:13px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
/* backtest hit/miss */
.bt-hit{background:rgba(52,199,89,.15);color:#1a6e33;border:1.5px solid rgba(52,199,89,.4);border-radius:50%;font-weight:900}
.bt-miss{background:rgba(0,0,0,.04);color:var(--label4);border:1.5px solid var(--sep2);border-radius:50%}
.bt-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:800}
</style>
</head>

  let TW={miss:.30,r10:.30,r5:.15,tr:.15,cont:.10};

  for(let t=0;t<10;t++)tailFinal[t]=tmsNorm[t]*TW.miss+tr10Norm[t]*TW.r10+r5Norm[t]*TW.r5+trTailN[t]*TW.tr+contAdj[t]*TW.cont;
  let tailRk=tailFinal.map((s,i)=>({tail:i,score:s,cnt:tCnt[i],r10:tR10[i],stk:tStk[i],gap:tMiss[i],contRate:(tailAppear[i]>0?(tailStay[i]/tailAppear[i]*100).toFixed(0):'--')})).sort((a,b)=>b.score-a.score);
  let numFinal={};
  for(let n=1;n<=39;n++){
    let tS=(trNum[n]||0)*100*W.tr;
    let fS=((cnt[n]/(L*5)*39)*30+(r10[n]/10*39)*40+(stk[n]>=3?30:stk[n]>=2?20:stk[n]>=1?10:0))*W.fq;
    let nS=(neiSc[n]||0)*15*W.nei;
    let rS=(repSc[n]||0)*20*W.rp;
    let mS=(miss[n]===0?100:miss[n]===1?80:miss[n]===2?60:miss[n]<=4?40:miss[n]<=7?20:5)*W.ms;
    let maS=mathNorm[n]*W.math;
    let trS=trendNorm[n]*W.trend;
    let cyS=cycleNorm[n]*W.cycle;
    let byS=bayesNorm[n]*W.bayes;
    let mkS=mk2Norm[n]*W.markov;
    let paS=pairNorm[n]*W.pair;
    let chS=chiNorm[n]*W.chi;
    numFinal[n]={total:tS+fS+nS+rS+mS+maS+trS+cyS+byS+mkS+paS+chS,tS,fS,nS,rS,mS,maS,trS,cyS,byS,mkS,paS,chS};
  }
  let numRk=Object.keys(numFinal).map(k=>({num:+k,score:numFinal[+k].total,detail:numFinal[+k]})).sort((a,b)=>b.score-a.score);
  let tailNums=[];for(let t=0;t<10;t++){let a=[];for(let n=1;n<=39;n++)if(n%10===t)a.push(n);tailNums.push(a);}
  if(!tailNums[0].length)tailNums[0]=[10,20,30];

  return{D,L,latest,latT,tails,cnt,r10,stk,miss,tCnt,tStk,tMiss,tR10,
    tr,trT,nF,trNum,neiSc,neiRate,neiHit,repN,repRate,repSc,
    topOE,topBS,tailRk,numRk,tailNums,oeM,
    mathNorm,trendNorm,cycleNorm,bayesNorm,mk2Norm,pairNorm,chiNorm,
    sumDist,spanDist,acDist,consecDist,zoneDist,
    sumMean,sumQ20,sumQ80,spanQ20,spanQ80,acQ20,acQ80,consAvg,topZone,
    topAC,topConsec,topSumBin,topSpanBin,
    avgInterval,periodScore,heatScore,consecSc,mk2Score,bayesScore,
    pairScore,pairCnt,topPairs,chiScore,chiRaw,expected,
    tailStay,tailAppear,contAdj,TW,
    calcAC,calcSum,calcSpan,calcConsec,calcZone,W};
}

/* ═══ BACKTEST ENGINE ═══ */
const DIM_KEYS=['tr','nei','fq','rp','ms','math','trend','cycle','bayes','markov','pair','chi'];
const DIM_NAMES={tr:'轉移矩陣',nei:'鄰號分析',fq:'頻率連莊',rp:'重複號',ms:'遺漏追蹤',math:'數學結構',trend:'走勢位置',cycle:'時間序列',bayes:'貝氏更新',markov:'馬可夫鏈',pair:'配對分析',chi:'卡方檢定'};
const DEFAULT_W={tr:.16,nei:.12,fq:.10,rp:.09,ms:.06,math:.10,trend:.08,cycle:.08,bayes:.06,markov:.03,pair:.07,chi:.05};

let adaptiveW=null; // will be computed by backtest

function getWeights(){
  return adaptiveW||{...DEFAULT_W};
}

function runBacktest(nDraws){
  nDraws=Math.min(nDraws,allData.length-10);
  if(nDraws<1)return null;
  
  let results=[];
  // per-dimension hit tracking
  let dimHits={};DIM_KEYS.forEach(k=>dimHits[k]={hitSum:0,testCount:0});
  
  for(let t=0;t<nDraws;t++){
    let histData=allData.slice(t+1); // everything after this draw
    let actual=allData[t].n;
    let actualSet=new Set(actual);
    let actualTails=new Set(actual.map(x=>x%10));
    
    // temporarily use default weights for fair comparison
    let savedW=adaptiveW;
    adaptiveW=null;
    let A=analyze(histData);
    adaptiveW=savedW;
    if(!A)continue;
    
    // Top 10 recommended numbers
    let top10=A.numRk.slice(0,10).map(r=>r.num);
    let top15=A.numRk.slice(0,15).map(r=>r.num);
    let top20=A.numRk.slice(0,20).map(r=>r.num);
    // Top 3 tails
    let top3tails=A.tailRk.slice(0,4).map(r=>r.tail);
    
    let numHit10=top10.filter(n=>actualSet.has(n)).length;
    let numHit15=top15.filter(n=>actualSet.has(n)).length;
    let numHit20=top20.filter(n=>actualSet.has(n)).length;
    let tailHit=top3tails.filter(t=>actualTails.has(t)).length;
    
    // Per-dimension: score each dimension's top 10 separately
    let dimDetail={};
    DIM_KEYS.forEach(dk=>{
      // Get per-dimension ranking
      let dimRank=[];
      for(let n=1;n<=39;n++){
        let sc=0;
        if(dk==='tr')sc=A.numRk.find(r=>r.num===n)?.detail?.tS||0;
        else if(dk==='nei')sc=A.numRk.find(r=>r.num===n)?.detail?.nS||0;
        else if(dk==='fq')sc=A.numRk.find(r=>r.num===n)?.detail?.fS||0;
        else if(dk==='rp')sc=A.numRk.find(r=>r.num===n)?.detail?.rS||0;
        else if(dk==='ms')sc=A.numRk.find(r=>r.num===n)?.detail?.mS||0;
        else if(dk==='math')sc=A.numRk.find(r=>r.num===n)?.detail?.maS||0;
        else if(dk==='trend')sc=A.numRk.find(r=>r.num===n)?.detail?.trS||0;
        else if(dk==='cycle')sc=A.numRk.find(r=>r.num===n)?.detail?.cyS||0;
        else if(dk==='bayes')sc=A.numRk.find(r=>r.num===n)?.detail?.byS||0;
        else if(dk==='markov')sc=A.numRk.find(r=>r.num===n)?.detail?.mkS||0;
        else if(dk==='pair')sc=A.numRk.find(r=>r.num===n)?.detail?.paS||0;
        else if(dk==='chi')sc=A.numRk.find(r=>r.num===n)?.detail?.chS||0;
        dimRank.push({n,sc});
      }
      dimRank.sort((a,b)=>b.sc-a.sc);
      let dimTop10=dimRank.slice(0,10).map(r=>r.n);
      let hits=dimTop10.filter(n=>actualSet.has(n)).length;
      dimDetail[dk]={top10:dimTop10,hits};
      dimHits[dk].hitSum+=hits;
      dimHits[dk].testCount++;
    });
    
    results.push({
      date:allData[t].d, actual, top10, top15, top20, top3tails,
      numHit10, numHit15, numHit20, tailHit, dimDetail, actualTails:[...actualTails]
    });
  }
  
  // compute per-dimension avg hit rate (out of 10)
  let dimAvg={};
  DIM_KEYS.forEach(k=>{
    dimAvg[k]=dimHits[k].testCount>0?dimHits[k].hitSum/dimHits[k].testCount:0;
  });
  
  return{results,dimAvg,nDraws};
}

function computeAdaptiveWeights(bt){
  if(!bt||!bt.dimAvg)return{...DEFAULT_W};
  let avg=bt.dimAvg;
  // Score each dimension: higher avg hits → higher weight
  let totalAvg=DIM_KEYS.reduce((s,k)=>s+avg[k],0);
  if(totalAvg===0)return{...DEFAULT_W};
  
  // Blend: 50% performance-based + 50% default (prevent overfitting)
  let newW={};
  DIM_KEYS.forEach(k=>{
    let perfW=avg[k]/totalAvg;
    newW[k]=perfW*0.50+DEFAULT_W[k]*0.50;
  });
  // Normalize to sum=1
  let sum=DIM_KEYS.reduce((s,k)=>s+newW[k],0);
  DIM_KEYS.forEach(k=>newW[k]=newW[k]/sum);
  return newW;
}

function calcNumTrans(D, gap){
  const cnt={}, total={};
  for(let i=gap;i<D.length;i++){
    D[i].n.forEach(fr=>{
      total[fr]=(total[fr]||0)+1;
      D[i-gap].n.forEach(to=>{const key=fr+'-'+to;cnt[key]=(cnt[key]||0)+1;});
    });
  }
  return{cnt,total};
}

/* ═══ CHI-SQUARE TAB ═══ */
function renderChi(el,A){
  let chiEntries=[];
  for(let n=1;n<=39;n++){
    let r=A.chiRaw[n];
    chiEntries.push({n,obs:r.obs,exp:+r.expected,chi2:r.chi2,hot:r.hot,score:A.chiScore[n]});
  }
  chiEntries.sort((a,b)=>b.chi2-a.chi2);
  let chi2Mx=chiEntries[0]?.chi2||1;
  
  // Significant hot numbers (chi2 > 3.84 = p<0.05 for df=1, and obs > expected)
  let sigHot=chiEntries.filter(e=>e.hot&&e.chi2>=3.84);
  let sigCold=chiEntries.filter(e=>!e.hot&&e.chi2>=3.84);
  
  // Score ranking (for recommendation)
  let chiTop=chiEntries.slice().sort((a,b)=>b.score-a.score).slice(0,10);
  let csMx=chiTop[0]?.score||1;
  
  el.innerHTML=`
  <div class="section-hdr">📏 卡方檢定（χ²）</div>
  <div class="card">
    <div class="card-hd"><h3>📊 統計顯著性分析</h3><p>各號碼實際出現次數 vs 理論期望值 (${A.expected.toFixed(1)} 次)，χ² ≥ 3.84 為顯著 (p&lt;0.05)</p></div>
    <div class="card-bd">
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">

          <div style="font-size:12px;color:var(--label3)">顯著偏熱</div>
          <div style="font-size:28px;font-weight:900;color:var(--green)">${sigHot.length}</div>
          <div style="font-size:11px;color:var(--label3)">個號碼</div>

        <div style="flex:1;min-width:120px;background:rgba(255,59,48,.1);border:1.5px solid rgba(255,59,48,.4);border-radius:14px;padding:14px;text-align:center">
          <div style="font-size:12px;color:var(--label3)">顯著偏冷</div>
          <div style="font-size:28px;font-weight:900;color:var(--red)">${sigCold.length}</div>
          <div style="font-size:11px;color:var(--label3)">個號碼</div>
        </div>
        <div style="flex:1;min-width:120px;background:var(--bg);border:1.5px solid var(--sep2);border-radius:14px;padding:14px;text-align:center">
          <div style="font-size:12px;color:var(--label3)">正常範圍</div>
          <div style="font-size:28px;font-weight:900;color:var(--label2)">${39-sigHot.length-sigCold.length}</div>
          <div style="font-size:11px;color:var(--label3)">個號碼</div>
        </div>
      </div>
    </div>
  </div>
  
  ${sigHot.length?`<div class="section-hdr">🔥 統計顯著偏熱號碼</div>
  <div class="card"><div class="card-hd"><h3>出現顯著高於期望</h3><p>χ² ≥ 3.84，實際 &gt; 期望 → 統計上「真熱」</p></div>
  <div class="card-bd">
    ${sigHot.sort((a,b)=>b.chi2-a.chi2).map((e,i)=>`<div class="row">
      <span class="rank-num ${i<3?['rank-1','rank-2','rank-3'][i]:''}">${i+1}</span>
      ${bl(e.n,34)}
      <span style="font-size:14px;color:var(--green);font-weight:700;min-width:50px">${e.obs} 次</span>
      <span style="font-size:12px;color:var(--label3);min-width:60px">期望 ${e.exp.toFixed(1)}</span>
      ${br(e.chi2/chi2Mx*100,'var(--green)',14)}
      <span style="font-size:14px;font-weight:800;color:var(--green);min-width:48px;text-align:right">χ²=${e.chi2.toFixed(1)}</span>
    </div>`).join('')}
  </div></div>`:``}
  
  ${sigCold.length?`<div class="section-hdr">❄️ 統計顯著偏冷號碼</div>
  <div class="card"><div class="card-hd"><h3>出現顯著低於期望</h3><p>χ² ≥ 3.84，實際 &lt; 期望 → 統計上「真冷」</p></div>
  <div class="card-bd">
    ${sigCold.sort((a,b)=>b.chi2-a.chi2).map((e,i)=>`<div class="row">
      <span class="rank-num">${i+1}</span>
      ${bl(e.n,34)}
      <span style="font-size:14px;color:var(--red);font-weight:700;min-width:50px">${e.obs} 次</span>
      <span style="font-size:12px;color:var(--label3);min-width:60px">期望 ${e.exp.toFixed(1)}</span>
      ${br(e.chi2/chi2Mx*100,'var(--red)',14)}
      <span style="font-size:14px;font-weight:800;color:var(--red);min-width:48px;text-align:right">χ²=${e.chi2.toFixed(1)}</span>
    </div>`).join('')}
  </div></div>`:``}

/* ═══ PREDICTION SYSTEM ═══ */
function loadPrediction(){try{let s=localStorage.getItem('l539_pred');return s?JSON.parse(s):null;}catch(e){return null;}}
function savePrediction(p){try{localStorage.setItem('l539_pred',JSON.stringify(p));}catch(e){}}
function clearPrediction(){try{localStorage.removeItem('l539_pred');}catch(e){}}
function loadPredHistory(){try{let s=localStorage.getItem('l539_predHist');return s?JSON.parse(s):[];}catch(e){return[];}}
function savePredHistory(h){try{localStorage.setItem('l539_predHist',JSON.stringify(h));}catch(e){}}

function generatePrediction(date){
  let A=analyze();
  if(!A)return null;
  let top3tails=A.tailRk.slice(0,4).map(r=>r.tail);
  let top5nums=A.numRk.slice(0,5).map(r=>r.num);
  
  // Per-dimension tail top3 for tracking
  let dimTailDetail={};
  
  // Each dimension's independent tail scoring
  let tails=A.tails,latT=A.latT,L=A.L;
  let MG=5,gw={1:.4,2:.28,3:.17,4:.09,5:.06};
  
  // 轉移矩陣 tail score
  let trS=new Array(10).fill(0);
  for(let g=1;g<=MG;g++){latT.forEach(fr=>{let tot=A.trT[g][fr]||1;for(let to=0;to<10;to++)trS[to]+=(A.tr[g][fr][to]/tot)*gw[g];});}
  dimTailDetail['轉移']=trS.map((s,i)=>({t:i,s})).sort((a,b)=>b.s-a.s).slice(0,3).map(r=>r.t);
  
  // 連莊率
  dimTailDetail['連莊']=A.contAdj?A.contAdj.map((s,i)=>({t:i,s})).sort((a,b)=>b.s-a.s).slice(0,3).map(r=>r.t):[0,1,2];
  
  // 遺漏
  let missS=A.tMiss.map(m=>m===0?30:m===1?50:m===2?75:m>=3?100:60);
  dimTailDetail['遺漏']=missS.map((s,i)=>({t:i,s})).sort((a,b)=>b.s-a.s).slice(0,3).map(r=>r.t);
  
  // 近10期頻率
  dimTailDetail['近10期']=A.tR10.map((s,i)=>({t:i,s})).sort((a,b)=>b.s-a.s).slice(0,3).map(r=>r.t);
  
  // 近5期頻率
  let tR5b=new Array(10).fill(0);
  A.D.slice(0,Math.min(5,A.D.length)).forEach(r=>r.n.forEach(x=>tR5b[x%10]++));
  dimTailDetail['近5期']=tR5b.map((s,i)=>({t:i,s})).sort((a,b)=>b.s-a.s).slice(0,3).map(r=>r.t);
  
  // 綜合（就是最終推薦）
  dimTailDetail['綜合']=top3tails;
  
  return{baseDate:date,tails:top3tails,nums:top5nums,dimTailDetail};
}

function verifyPrediction(pred,actualNums){
  let actualSet=new Set(actualNums);
  let actualTails=[...new Set(actualNums.map(x=>x%10))];
  let tailHit=pred.tails.filter(t=>actualTails.includes(t)).length;
  let numHit=pred.nums.filter(n=>actualSet.has(n)).length;
  
  // Per-dimension verification
  let dimDetail={};
  if(pred.dimTailDetail){
    Object.entries(pred.dimTailDetail).forEach(([k,tails])=>{
      dimDetail[k]=tails.filter(t=>actualTails.includes(t)).length;
    });
  }
  
  return{tailHit,numHit,dimDetail};
}

function doAdd(){
  let date=document.getElementById('addDate').value;
  let nums=[];for(let i=0;i<5;i++){let v=parseInt(document.getElementById('addNum'+i).value);nums.push(v);}
  let parsed=nums.filter(x=>!isNaN(x)&&x>=1&&x<=39);
  let msgEl=document.getElementById('addMsg');
  if(parsed.length!==5){msgEl.innerHTML='<div class="msg err">❌ 請輸入 5 個 1～39 號碼</div>';return;}
  if(new Set(parsed).size!==5){msgEl.innerHTML='<div class="msg err">❌ 號碼不可重複</div>';return;}
  if(!date.match(/^\d{4}\/\d{2}\/\d{2}$/)){msgEl.innerHTML='<div class="msg err">❌ 日期格式：YYYY/MM/DD</div>';return;}
  if(allData.some(r=>r.d===date)){msgEl.innerHTML='<div class="msg err">❌ 該日期已有資料</div>';return;}
  let sorted=[...parsed].sort((a,b)=>a-b);
  
  // ── Step 1: 驗證上期預測 ──
  let pred=loadPrediction();
  let verifyResult=null;
  if(pred){
    verifyResult=verifyPrediction(pred,sorted);
    let hist=loadPredHistory();
    hist.unshift({
      date:date,
      actual:sorted,
      actualTails:[...new Set(sorted.map(x=>x%10))],
      predTails:pred.tails,
      predNums:pred.nums,
      tailHit:verifyResult.tailHit,
      numHit:verifyResult.numHit,
      dimDetail:verifyResult.dimDetail
    });
    if(hist.length>50)hist=hist.slice(0,50);
    savePredHistory(hist);
    clearPrediction();
  }
  
  // ── Step 2: 新增資料 ──
  allData=[{d:date,n:sorted},...allData];
  allData.sort((a,b)=>b.d.localeCompare(a.d));
  saveData();
  
  // ── Step 3: 產生下期預測 ──
  let newPred=generatePrediction(date);
  if(newPred)savePrediction(newPred);
  
  // ── Step 4: 顯示結果 ──
  let resultHTML='';
  if(verifyResult){
    let tc=verifyResult.tailHit>=2?'var(--green)':'var(--red)';
    let nc=verifyResult.numHit>=1?'var(--blue)':'var(--red)';
    resultHTML+=`<div class="msg ${verifyResult.tailHit>=2?'ok':'err'}" style="margin-bottom:10px">
      🎯 上期預測驗證：尾數命中 <strong>${verifyResult.tailHit}/4</strong>，號碼命中 <strong>${verifyResult.numHit}/5</strong>
    </div>`;
  }
  if(newPred){
    resultHTML+=`<div class="msg ok">
      ✅ 已新增 ${date}，下期預測已產生！<br>
      🔮 推薦尾數：<strong>${newPred.tails.join(', ')}</strong><br>
      🎯 推薦號碼：<strong>${newPred.nums.map(n=>String(n).padStart(2,'0')).join(', ')}</strong>
    </div>`;
  }
  msgEl.innerHTML=resultHTML;
  
  renderAll();
}
function doDelete(d){allData=allData.filter(r=>r.d!==d);saveData();renderAll();}
function doReset(){allData=[...INIT_DATA];try{localStorage.removeItem('l539v9');localStorage.removeItem('l539_pred');localStorage.removeItem('l539_predHist');}catch(e){}renderAll();}

// ── 初始化：如果還沒有預測，用現有資料產生一個 ──
let saved=loadData();
// 合併：INIT_DATA 為基底 + localStorage 中使用者手動新增的資料
if(saved&&saved.length>0){
  let initDates=new Set(INIT_DATA.map(r=>r.d));
  let userAdded=saved.filter(r=>!initDates.has(r.d));
  allData=[...userAdded,...INIT_DATA].sort((a,b)=>b.d.localeCompare(a.d));
} else {
  allData=[...INIT_DATA];
}
if(!loadPrediction()&&allData.length>3){
  let initPred=generatePrediction(allData[0].d);
  if(initPred)savePrediction(initPred);
}
renderAll();
</script>
