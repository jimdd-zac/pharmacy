<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="藥局管理">
<title>💊 藥局客人管理</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:#F5F3EE;color:#1A1A1A;min-height:100vh;max-width:520px;margin:0 auto}
  input,textarea,select{font-family:inherit;font-size:14px}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}

  /* Colors */
  :root{
    --bg:#F5F3EE;--card:#fff;--pri:#1B6B4A;--pl:#2D9D6F;--pp:#DFF5E8;
    --acc:#D95D39;--al:#F0A07A;--text:#1A1A1A;--ts:#7A7A6E;--bdr:#E4E0D8;
    --dng:#C0392B;--dbg:#FEF0EE;--wrn:#E67E22;--wbg:#FFF8EE;--ok:#1B6B4A;--okbg:#E8F6EE;
  }

  .header{background:linear-gradient(135deg,#1B6B4A,#2D9D6F);padding:22px 16px 16px;color:#fff;border-radius:0 0 22px 22px}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .header-label{font-size:10px;font-weight:600;letter-spacing:2px;opacity:.7;margin-bottom:2px}
  .header-title{font-size:21px;font-weight:800;margin:0}
  .header-sub{margin:5px 0 12px;opacity:.8;font-size:11px}
  .header-btns{display:flex;gap:5px;flex-shrink:0}
  .hbtn{display:flex;align-items:center;gap:5px;padding:7px 10px;background:rgba(255,255,255,.2);color:#fff;border-radius:9px;font-size:12px;font-weight:700}
  .hbtn.accent{background:rgba(255,255,255,.3)}
  .search-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.18);border-radius:12px;padding:0 14px}
  .search-bar input{flex:1;background:none;border:none;padding:11px 0;color:#fff;font-size:15px;outline:none}
  .search-bar input::placeholder{color:rgba(255,255,255,.6)}
  .clear-btn{background:none;color:#fff;font-size:16px;padding:4px}

  .card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);padding:13px}
  .inp{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:10px;font-size:14px;background:#FAFAF7;outline:none}
  .inp:focus{border-color:var(--pri)}
  .lbl{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:3px;display:block}

  .btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border-radius:10px;padding:9px 14px}
  .btn-pri{background:var(--pri);color:#fff}
  .btn-sec{background:#eee;color:var(--text)}
  .btn-dng{background:var(--dbg);color:var(--dng)}
  .btn-ghost{background:none;color:var(--pri);padding:4px}

  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block}
  .badge-line{background:#06C755;color:#fff}
  .badge-phone{background:#4A90D9;color:#fff}
  .badge-chronic{background:var(--al);color:#fff}
  .badge-general{background:var(--pp);color:var(--pri)}

  .refill-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:3px}

  .section-title{font-size:14px;font-weight:700;margin:14px 0 8px}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}

  /* Modal overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center}
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:flex-end;justify-content:center}
  .sheet-inner{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}

  /* Timeline */
  .tl-dot{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .tl-line{width:2px;flex:1}

  /* Patient list item */
  .patient-item{display:flex;align-items:center;gap:12px;padding:13px;background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;border:none;width:100%;text-align:left}
  .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#DFF5E8,#E4E0D8);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#1B6B4A}

  /* Urgent */
  .urgent-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;margin-bottom:5px}

  /* RxForm */
  .rx-card{padding:14px;border-radius:10px;border:1px solid var(--bdr);position:relative;background:#FAFAF7;margin-bottom:8px}
  .rx-card.review{background:#FFFDE7;border-color:#FFD54F}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

  /* Contact method btns */
  .contact-btns{display:flex;gap:8px;flex-wrap:wrap}
  .contact-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--bdr);background:#F0F0EC;color:var(--ts);cursor:pointer}
  .contact-btn.active{border:none;color:#fff}

  /* Schedule editor */
  .sched-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}

  /* Progress bar */
  .prog-bar{height:5px;background:#E0DDD5;border-radius:3px;overflow:hidden;margin-bottom:2px}
  .prog-fill{height:100%;background:linear-gradient(90deg,#1B6B4A,#2D9D6F);border-radius:3px;transition:width .3s}

  /* Import panel */
  .imp-panel{margin:12px 16px 0;padding:16px;background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:2px solid var(--pri)}

  /* Page transitions */
  #app > div{animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.flex-1{flex:1}.flex-col{flex-direction:column}.wrap{flex-wrap:wrap}
  .p-16{padding:16px}.pb-24{padding-bottom:24px}.mt-8{margin-top:8px}.mb-8{margin-bottom:8px}.mb-14{margin-bottom:14px}.mb-18{margin-bottom:18px}
  .text-center{text-align:center}.bold{font-weight:700}.italic{font-style:italic}
  .empty{text-align:center;padding:36px;color:var(--ts)}
  .empty-icon{font-size:44px;margin-bottom:10px}
  .list-gap{display:flex;flex-direction:column;gap:7px}

  .back-bar{padding:14px 16px 6px;display:flex;align-items:center;gap:10px}
  .back-bar span{font-size:15px;font-weight:600;flex:1}
  .profile-center{text-align:center;padding:10px 20px 14px}
  .profile-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 10px;background:linear-gradient(135deg,#DFF5E8,#E4E0D8);border:3px solid #1B6B4A;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#1B6B4A}
  .rx-block{padding:12px;background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:8px}
  .rx-block.chronic{border-left:4px solid var(--acc)}
  .rx-block.general{border-left:4px solid var(--pri)}
  .prog-box{padding:12px;background:#F9F8F4;border-radius:12px;margin-bottom:16px}

  .save-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;background:linear-gradient(135deg,#1B6B4A,#2D9D6F);color:#fff;border-radius:12px;font-size:15px;font-weight:800;border:none;cursor:pointer;margin-top:4px}

  .tab-btns{display:flex;gap:8px;margin-bottom:14px}
  .tab-btn{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer}

  /* Scrollable content */
  .scroll-content{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // First time: start empty
  return [];
}
function saveData(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e) {}
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(d) { if(!d) return ""; const t=new Date(d); return `${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,"0")}/${String(t.getDate()).padStart(2,"0")}`; }
function fmtS(d) { if(!d) return ""; const t=new Date(d); return `${String(t.getMonth()+1).padStart(2,"0")}/${String(t.getDate()).padStart(2,"0")}`; }
function daysTo(s) { if(!s) return Infinity; const t=new Date(); t.setHours(0,0,0,0); const d=new Date(s+'T00:00:00'); return Math.round((d-t)/864e5); }
function nextRef(p) { if(!p.refillSchedule?.length) return null; const u=p.usedRefills||0; return u>=p.refillSchedule.length?null:p.refillSchedule[u]; }
function hasChronic(p) { return (p.prescriptions||[]).some(rx=>rx.isChronic); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function svgIcon(d, s=20) {
  return `<svg width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="${d}"/></svg>`;
}
const ISearch = svgIcon("M21 21l-4.35-4.35M11 3a8 8 0 100 16 8 8 0 000-16z");

const IEdit   = svgIcon("M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z", 16);
const IImp    = svgIcon("M12 3v12m0 0l-4-4m4 4l4-4M4 15v2a2 2 0 002 2h12a2 2 0 002-2v-2");
const IAlert  = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>`;
const IUndo   = svgIcon("M3 7v6h6M3 13a9 9 0 0115.36-6.36L21 9", 16);
const IChk    = `<svg width="10" height="10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = {
  patients: loadData(),
  view: 'list',       // list | detail | form
  sel: null,          // selected patient id
  form: null,         // form object
  search: '',
  showImp: false,
  impTxt: '',
  impMsg: '',
  isReview: false,
  delTarget: null,
  showBak: false,
  bakTab: 'export',
  undoStack: [],
};

function persist(newP) {
  state.undoStack.push(JSON.stringify(state.patients));
  if (state.undoStack.length > 20) state.undoStack.shift();
  state.patients = newP;
  saveData(newP);
  render();
}
function doUndo() {
  if (!state.undoStack.length) return;
  state.patients = JSON.parse(state.undoStack.pop());
  saveData(state.patients);
  if (state.sel) {
    const u = state.patients.find(p=>p.id===state.sel);
    if (!u) { state.sel=null; state.view='list'; }
  }
  showToast("↩️ 已復原"); render();
}

// ══════════════════════════════════════════
// COMPONENTS (HTML strings)
// ══════════════════════════════════════════
function refillBadgeHTML(p) {
  if (!hasChronic(p)) return '';
  const n = nextRef(p);
  if (!n) return `<span class="refill-badge" style="color:var(--ts);background:#eee">已領完</span>`;
  const d = daysTo(n.startDate);
  let bg, color, label;
  if (d < 0)      { bg='var(--dbg)'; color='var(--dng)'; label='可領藥中'; }
  else if (d <= 3){ bg='var(--wbg)'; color='var(--wrn)'; label=d===0?'今天可領':d+'天後可領'; }
  else            { bg='var(--okbg)';color='var(--ok)';  label=d+'天後可領'; }
  return `<span class="refill-badge" style="color:${color};background:${bg}">${d<=3?IAlert:''}${esc(label)}</span>`;
}

function contactBadgeHTML(method) {
  if (!method) return '';
  if (method==='line')  return `<span class="badge badge-line">LINE</span>`;
  if (method==='phone') return `<span class="badge badge-phone">📞 電話</span>`;
  if (method==='both')  return `<span class="badge badge-line">LINE</span><span class="badge badge-phone" style="margin-left:4px">📞</span>`;
  return '';
}

function timelineHTML(p) {
  if (!p.refillSchedule?.length) return '';
  const used = p.usedRefills||0;
  const now = new Date(); now.setHours(0,0,0,0);
  let html = `<div style="margin-top:8px"><div style="font-size:12px;font-weight:700;color:var(--ts);margin-bottom:6px">📅 領藥時程</div>`;
  p.refillSchedule.forEach((s,i)=>{
    const done=i<used, cur=i===used;
    const st=new Date(s.startDate), en=s.endDate?new Date(s.endDate):null;
    const inW=cur&&st<=now&&(!en||now<=en), past=cur&&en&&now>en;
    const dotColor = done?'#1B6B4A':inW?'#D95D39':past?'#C0392B':cur?'#E67E22':'#E4E0D8';
    const dotBg = done?'#1B6B4A':'white';
    const dotSize = done?18:14;
    const lineColor = i<used?'#1B6B4A':'#E4E0D8';
    let rowBg = inW?'var(--wbg)':past?'var(--dbg)':'transparent';
    html += `<div style="display:flex;align-items:stretch;gap:10px">
      <div style="display:flex;flex-direction:column;align-items:center;width:20px">
        ${i>0?`<div style="width:2px;height:6px;background:${i<=used?'#1B6B4A':'#E4E0D8'}"></div>`:''}
        <div class="tl-dot" style="width:${dotSize}px;height:${dotSize}px;background:${dotBg};border:2.5px solid ${dotColor}">${done?IChk:''}</div>
        ${i<p.refillSchedule.length-1?`<div class="tl-line" style="background:${lineColor}"></div>`:''}
      </div>
      <div style="flex:1;padding:6px 10px;margin-bottom:4px;border-radius:8px;background:${rowBg};opacity:${done?0.6:1}">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:${done?400:700};text-decoration:${done?'line-through':'none'};color:${done?'var(--ts)':'var(--text)'}">第 ${s.refillNumber} 次</span>
          <span style="font-size:13px;color:${done?'var(--ts)':'var(--text)'}">${esc(fmt(s.startDate))}${s.endDate?' — '+fmt(s.endDate):''}</span>
          ${done?`<span style="font-size:10px;color:var(--pri);font-weight:600">✓ 已領</span>`:''}
          ${inW?`<span style="font-size:10px;font-weight:700;color:var(--acc);background:#fff3e6;padding:1px 6px;border-radius:6px">← 現在可領</span>`:''}
          ${past?`<span style="font-size:10px;font-weight:700;color:var(--dng)">逾期未領</span>`:''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderList() {

  const filtered = s.patients.filter(p=>
    p.name.toLowerCase().includes(s.search.toLowerCase())||
    (p.prescriptions||[]).some(rx=>(rx.name||"").toLowerCase().includes(s.search.toLowerCase()))

  const urgent = s.patients.filter(p=>hasChronic(p))
    .map(p=>{ const n=nextRef(p); return n?{p,d:daysTo(n.startDate),n}:null; })

  const undoDisabled = !s.undoStack.length;

  let html = `
  <div>
    <div class="header">

          <div class="header-label">PHARMACY</div>

        </div>

      <div class="search-bar">
        ${ISearch}

        ${s.search?`<button class="clear-btn" onclick="clearSearch()">✕</button>`:''}
      </div>
    </div>

    ${s.showImp?`
    <div class="imp-panel">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--pri)">📋 貼上 JSON</div>
      <textarea id="imp-txt" class="inp" rows="5" style="font-family:monospace;font-size:12px;resize:vertical" placeholder="貼上 Claude 給的 JSON…">${esc(s.impTxt)}</textarea>
      ${s.impMsg?`<div style="margin-top:6px;font-size:13px;font-weight:600;color:var(--dng)">${esc(s.impMsg)}</div>`:''}
      <div class="flex gap-8" style="margin-top:10px">
        <button class="btn btn-pri" style="flex:1;justify-content:center" onclick="handleImport()">匯入並確認</button>
        <button class="btn btn-sec" onclick="closeImp()">關閉</button>

    ${!s.search&&urgent.length?`

          <div><strong>${esc(r.p.name)}</strong><div style="font-size:11px;color:var(--ts);margin-top:1px">${esc(fmtS(r.n.startDate))}~${esc(fmtS(r.n.endDate))}</div></div>
          ${refillBadgeHTML(r.p)}
        </div>`).join('')}
    </div>`:''}

    <div class="p-16">
      <div class="flex justify-between items-center mb-8">
        <span id="patient-count" style="font-size:12px;color:var(--ts)">${filtered.length} 位客人</span>
        <button class="btn btn-pri" onclick="goNewForm()">${IPlus} 手動新增</button>
      </div>
      <div id="patient-list">${!filtered.length?`
        <div class="empty">
          <div class="empty-icon">${s.search?'🔍':'👋'}</div>

        <div class="list-gap">

  if (!p) { state.view='list'; return renderList(); }
  const chronicRxs = (p.prescriptions||[]).filter(rx=>rx.isChronic);
  const generalRxs = (p.prescriptions||[]).filter(rx=>!rx.isChronic);

  <div>
    <div class="back-bar">
      <button class="btn-ghost" onclick="goList()">${IBack}</button>

      <button class="btn" style="background:var(--pp);color:var(--pri);font-size:12px;padding:5px 10px" onclick="goEditForm('${p.id}')">${IEdit} 編輯</button>

        ${total>0?`

              <span style="font-size:13px;font-weight:700">📅 領藥進度</span>

            ${timelineHTML(p)}
            ${used<total?`<button onclick="markRefill('${p.id}')" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;width:100%;padding:10px;background:var(--pri);color:#fff;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer">✓ 標記已領藥（第 ${used+1} 次）</button>`:''}

              <div><div style="font-weight:700;font-size:14px">${esc(rx.name)}</div>${rx.dosage?`<div style="font-size:12px;color:var(--ts);margin-top:1px">${esc(rx.dosage)}</div>`:''}</div>
              <span class="badge badge-general">一般</span>

      <div style="margin:6px 16px 0;padding:14px;background:#FFF8E1;border:2px solid #FFB300;border-radius:14px;display:flex;align-items:center;gap:10px">

  <div class="rx-card ${state.isReview?'review':''}" id="rx-${i}">

    <span style="font-size:12px;color:var(--ts)">~</span>
    <input type="date" class="inp" style="flex:1;padding:6px 8px;font-size:13px" value="${esc(s.endDate||'')}" onchange="updateSched(${si},'endDate',this.value)">

// DELETE MODAL

function confirmDelete(id) {
  state.delTarget = id;
  const p = state.patients.find(x=>x.id===id);
  document.body.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="del-modal" onclick="cancelDelete()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3 style="font-size:16px;margin-bottom:8px">⚠️ 確定刪除？</h3>
        <p style="font-size:14px;color:var(--ts);margin-bottom:18px;line-height:1.5">將刪除「${esc(p?.name||'')}」的所有資料，<br>可按「復原」回復。</p>
        <div class="flex gap-10">
          <button class="btn btn-sec" style="flex:1;justify-content:center" onclick="cancelDelete()">取消</button>
          <button class="btn" style="flex:1;justify-content:center;background:var(--dng);color:#fff" onclick="execDelete()">刪除</button>
        </div>
      </div>
    </div>`);
}
function cancelDelete() { document.getElementById('del-modal')?.remove(); state.delTarget=null; }
function execDelete() {
  if (!state.delTarget) return;
  persist(state.patients.filter(p=>p.id!==state.delTarget));
  state.delTarget=null; state.view='list'; state.sel=null;
  document.getElementById('del-modal')?.remove();
  showToast("🗑️ 已刪除");
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function goList()   { state.view='list'; state.sel=null; render(); }
function goDetail(id) { state.view='detail'; state.sel=id; render(); }
function goNewForm() {
  state.form={id:uid(),name:'',phone:'',contactMethod:'',prescriptions:[],notes:'',refillSchedule:[],usedRefills:0};
  state.view='form'; state.isReview=false; render();
}
function goEditForm(id) {
  const p = state.patients.find(x=>x.id===id);
  state.form = JSON.parse(JSON.stringify(p));
  state.view='form'; state.isReview=false; render();
}
function goBack() {
  state.view = state.sel?'detail':'list';
  state.isReview=false; render();
}

function onSearch(v) { state.search=v; render(); }
function clearSearch() { state.search=''; render(); }
function toggleImp() { state.showImp=!state.showImp; render(); }
function closeImp() { state.showImp=false; state.impTxt=''; state.impMsg=''; render(); }

function updateForm(k,v) {
  state.form[k]=v;
  // Re-render only form to avoid losing focus on non-rerendering fields
  if (k==='contactMethod'||k==='isChronic') render();
  // For isChronic change, need full re-render to show/hide schedule editor
}
function updateRx(i,k,v) {
  state.form.prescriptions[i][k]=v;
  if (k==='isChronic') render();
}
function addRx() {
  state.form.prescriptions.push({name:'',dosage:'',isChronic:false,note:''});
  render();
}
function removeRx(i) {
  state.form.prescriptions.splice(i,1);
  render();
}
function updateSched(si,k,v) { state.form.refillSchedule[si][k]=v; }
function addSched() {
  const s = state.form.refillSchedule;
  s.push({refillNumber:s.length+1,startDate:'',endDate:''});
  render();
}
function removeSched(si) {
  state.form.refillSchedule.splice(si,1);
  state.form.refillSchedule = state.form.refillSchedule.map((x,i)=>({...x,refillNumber:i+1}));
  render();
}

function markRefill(pid) {
  const u = state.patients.map(p=>p.id!==pid?p:{...p,usedRefills:(p.usedRefills||0)+1});
  persist(u);
  state.sel=pid;
  showToast("✅ 已標記領藥");
}

function doSave() {
  // Collect current form values from DOM before saving
  const nameEl = document.getElementById('f-name');
  const phoneEl = document.getElementById('f-phone');
  if (nameEl) state.form.name = nameEl.value;
  if (phoneEl) state.form.phone = phoneEl.value;
  // notes
  const notesEl = document.querySelector('textarea');
  if (notesEl) state.form.notes = notesEl.value;

  if (!state.form.name.trim()) { showToast('請輸入姓名'); return; }
  const exists = state.patients.some(p=>p.id===state.form.id);
  const u = exists
    ? state.patients.map(p=>p.id===state.form.id?state.form:p)
    : [...state.patients, state.form];
  persist(u);
  showToast('✅ 已儲存');
  state.sel=state.form.id; state.view='detail'; state.isReview=false;
  render();
}

function handleImport() {
  const el = document.getElementById('imp-txt');
  let t = (el?el.value:state.impTxt).trim();
  state.impTxt = t;
  try {
    const m = t.match(/`(?:json)?\s*([\s\S]*?)`/); if(m) t=m[1].trim();
    const data = JSON.parse(t); const entries = Array.isArray(data)?data:[data];
    if (!entries.length||!entries[0].name) throw new Error('no');
    const entry = entries[0];
    let schedule = entry.refillSchedule||[]; let usedRefills=entry.usedRefills||0;
    if (!schedule.length) {
      const fc=(entry.prescriptions||[]).find(rx=>rx.isChronic&&rx.refillSchedule?.length);
      if(fc){schedule=fc.refillSchedule;usedRefills=fc.usedRefills||0;}
    }
    const fo={
      id:uid(), name:entry.name, phone:entry.phone||'', contactMethod:entry.contactMethod||'', notes:entry.notes||'',
      refillSchedule:schedule.map(s=>({refillNumber:s.refillNumber,startDate:s.startDate||'',endDate:s.endDate||''})),
      usedRefills,
      prescriptions:(entry.prescriptions||[]).map(rx=>({name:rx.name||'',dosage:rx.dosage||'',isChronic:rx.isChronic||false,note:rx.note||''}))
    };
    const existing = state.patients.find(p=>p.name===entry.name);
    if(existing){fo.id=existing.id;fo.contactMethod=existing.contactMethod||fo.contactMethod;}
    state.form=fo; state.view='form'; state.isReview=true;
    state.showImp=false; state.impTxt=''; state.impMsg='';
    render();
  } catch(e) { state.impMsg='❌ 格式錯誤'; render(); }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const wasFocused = document.activeElement?.id === 'search-inp';

  let html = '';
  if (state.view==='list')        html = renderList();
  else if (state.view==='detail') html = renderDetail();
  else if (state.view==='form')   html = renderForm();
  app.innerHTML = html;

  const si = document.getElementById('search-inp');
  if (si) {
    si.addEventListener('input', function() {
      state.search = this.value;
      updateListDOM();
    });
    if (wasFocused) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
  }
  if (!wasFocused) window.scrollTo(0,0);
}

function updateListDOM() {
  const s = state;
  const filtered = s.patients.filter(p=>
    p.name.toLowerCase().includes(s.search.toLowerCase())||
    (p.prescriptions||[]).some(rx=>(rx.name||'').toLowerCase().includes(s.search.toLowerCase()))
  );
  const urgent = s.patients.filter(p=>hasChronic(p))
    .map(p=>{ const n=nextRef(p); return n?{p,d:daysTo(n.startDate),n}:null; })
    .filter(Boolean).filter(r=>r.d<=7).sort((a,b)=>a.d-b.d);

  const urgentEl = document.getElementById('urgent-section');
  if (urgentEl) {
    if (!s.search && urgent.length) {
      urgentEl.style.display='';
      urgentEl.innerHTML=urgent.slice(0,5).map(r=>`<div class="urgent-item" style="background:${r.d<0?"var(--dbg)":"var(--wbg)"}" onclick="goDetail('${r.p.id}')"><div><strong>${esc(r.p.name)}</strong><div style="font-size:11px;color:var(--ts);margin-top:1px">${esc(fmtS(r.n.startDate))}~${esc(fmtS(r.n.endDate))}</div></div>${refillBadgeHTML(r.p)}</div>`).join('');
    } else { urgentEl.style.display='none'; }
  }

  const listEl = document.getElementById('patient-list');
  if (listEl) {
    listEl.innerHTML = !filtered.length
      ? `<div class="empty"><div class="empty-icon">${s.search?'🔍':'👋'}</div><p>${s.search?'找不到符合的客人':'尚無客人資料'}</p></div>`
      : `<div class="list-gap">${filtered.map(p=>`<button class="patient-item" onclick="goDetail('${p.id}')"><div class="avatar">${esc((p.name||'?')[0])}</div><div style="flex:1;min-width:0"><div class="flex items-center gap-6 wrap">${esc(p.name)} ${contactBadgeHTML(p.contactMethod)}</div><div style="font-size:12px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((p.prescriptions||[]).map(rx=>rx.name).filter(Boolean).join('、'))||'尚無處方'}</div><div style="margin-top:3px">${hasChronic(p)?refillBadgeHTML(p):''}</div></div><span style="color:var(--ts);font-size:18px">›</span></button>`).join('')}</div>`;
  }

  const countEl = document.getElementById('patient-count');
  if (countEl) countEl.textContent = filtered.length + ' 位客人';
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
render();
</script>
</body>
</html>
