<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="藥局管理">
<meta name="color-scheme" content="light">
<title>藥局管理</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,'Helvetica Neue',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh;max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased;color-scheme:light}
html{background:#F2F2F7;color-scheme:light}
input,textarea,select{font-family:inherit;font-size:16px;color:#1C1C1E;background:#FFFFFF;border:1px solid #D1D1D6;-webkit-appearance:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none;color:#1C1C1E}
:root{--bg:#f2f2f7;--bg2:#ffffff;--card:#FFF;--sep:rgba(60,60,67,0.18);--sepL:rgba(60,60,67,0.08);--lb:rgba(60,60,67,0.48);--sec:rgba(60,60,67,0.72);--tx:#000000;--blue:#007AFF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--purple:#AF52DE;--yellow:#FFCC00;--teal:#5AC8FA;--indigo:#5856D6;--blueBg:rgba(0,122,255,0.10);--greenBg:rgba(52,199,89,0.12);--orangeBg:rgba(255,149,0,0.12);--redBg:rgba(255,59,48,0.10);--purpleBg:rgba(175,82,222,0.10)}
.home-top{padding:52px 20px 22px;text-align:center;background:linear-gradient(135deg,#1B6B4A,#2D9D6F);border-radius:0 0 22px 22px;color:#fff}.home-top h1{font-size:36px;font-weight:900;letter-spacing:-.5px;color:#fff;text-align:center}.home-top p{font-size:14px;color:rgba(255,255,255,.75);margin-top:4px}
.home-cards{padding:16px;display:flex;flex-direction:column;gap:12px;padding-bottom:40px;background:var(--bg)}
.hcard{background:var(--bg2);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;transition:transform .12s;box-shadow:0 1px 3px rgba(0,0,0,.10)}.hcard:active{transform:scale(.97)}
.hcard-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.hcard-icon.rx{background:linear-gradient(135deg,#FF3B30,#FF6259)}.hcard-icon.ord{background:linear-gradient(135deg,#007AFF,#5AC8FA)}
.hcard-body{flex:1}.hcard-title{font-size:17px;font-weight:600}.hcard-desc{font-size:13px;color:var(--lb);margin-top:2px}
.hcard-stat{display:inline-block;margin-top:6px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.hcard-arrow{color:var(--sep);font-size:20px}
.nav{padding:10px 12px;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1B6B4A,#2D9D6F);border-bottom:none;position:sticky;top:0;z-index:100;color:#fff;flex-wrap:nowrap}
.nav-title{font-size:16px;font-weight:600;flex:1;color:#fff;white-space:nowrap;overflow:hidden}.nav-btn{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,0.2);padding:5px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.nav-back{display:flex;align-items:center;gap:2px;font-size:15px;font-weight:500;color:#fff;background:none;padding:4px}
.section{padding:0 16px;margin-bottom:16px}.section-label{font-size:13px;font-weight:700;color:#636366;text-transform:uppercase;padding:8px 4px 6px;letter-spacing:1px}
.s-card{background:var(--bg2);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.10)}
.s-row{padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:44px}.s-row+.s-row{border-top:1px solid var(--sepL)}
.inp{width:100%;padding:11px 14px;border:1px solid var(--sepL);border-radius:10px;font-size:16px;background:var(--card);outline:none;transition:border .2s}.inp:focus{border-color:var(--blue)}
.lbl{font-size:13px;font-weight:600;color:#1C1C1E;margin-bottom:4px;display:block}
.btn-blue{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;border-radius:10px;padding:10px 18px}.btn-blue:active{opacity:.8}
.btn-gray{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--sepL);color:var(--tx);font-size:15px;font-weight:600;border-radius:10px;padding:10px 18px}
.btn-ghost{background:none;color:var(--blue);padding:4px;font-size:15px;font-weight:500}
.badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.88);color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;backdrop-filter:blur(10px)}.toast.show{opacity:1}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;background:rgba(0,0,0,.35);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:14px;padding:24px;max-width:300px;width:100%;text-align:center}
.p-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);cursor:pointer}.p-item+.p-item{border-top:1px solid var(--sepL)}

.p-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff}
.refill-pill{font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:3px}
.tl-dot{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}.tl-line{width:2px;flex:1}
.rx-block{padding:12px 16px}.rx-block+.rx-block{border-top:1px solid var(--sepL)}
.form-group{margin-bottom:16px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.contact-btns{display:flex;gap:8px;flex-wrap:wrap}.contact-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;background:var(--sepL);color:var(--sec)}.contact-btn.on{background:var(--blue);color:#fff}
.rx-form-card{padding:14px;border-radius:10px;border:1px solid var(--sepL);background:#FAFAFA;margin-bottom:8px;position:relative}
.sched-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.save-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border-radius:12px;font-size:17px;font-weight:600;border:none;margin-top:8px}.save-btn:active{opacity:.8}
.del-btn{width:100%;padding:12px;background:var(--redBg);color:var(--red);border-radius:12px;font-size:15px;font-weight:600;border:none;margin-top:8px}
.imp-panel{margin:0 16px;padding:16px;background:var(--card);border-radius:12px;margin-bottom:12px}
.prog-bar{height:4px;background:var(--sepL);border-radius:2px;overflow:hidden}.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.prog-box{padding:14px;background:#FAFAFA;border-radius:12px;margin:12px 0}
.search-box{margin:0 16px 10px;position:relative}.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--lb)}.search-box input{width:100%;padding:10px 12px 10px 38px;border-radius:10px;border:none;background:var(--card);font-size:15px;outline:none}.search-box input::placeholder{color:var(--sep)}.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--sep);color:#fff;width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center}
.o-stat-bar{display:flex;gap:1px;margin:12px 16px;background:var(--sepL);border-radius:12px;overflow:hidden}.o-stat-item{flex:1;padding:10px 4px;text-align:center;background:var(--card)}.o-stat-item .num{font-size:20px;font-weight:700}.o-stat-item .lbl{font-size:11px;color:var(--lb);margin-top:1px}
.o-card{background:var(--card);padding:14px 16px}.o-card+.o-card{border-top:1px solid var(--sepL)}
.o-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600}
.o-status-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;flex-shrink:0}
.o-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.o-action{background:var(--sepL);color:var(--blue);padding:6px 12px;font-size:13px;font-weight:600;border-radius:6px}.o-action.red{color:var(--red)}
.o-fab{position:fixed;bottom:24px;right:16px;z-index:50;display:flex;flex-direction:column;gap:10px}.o-fab button{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.o-import{margin:0 16px 12px;padding:14px;background:var(--card);border-radius:12px}
.o-sup-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.o-sup-btns button{padding:8px 4px;font-size:13px;border-radius:8px;font-weight:500;background:var(--sepL);color:var(--sec);border:2px solid transparent}.o-sup-btns button.on{background:#F5E6D3;color:#8B5E3C;border-color:#8B5E3C}
.o-stat-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.o-stat-btns button{padding:8px 4px;font-size:13px;border-radius:8px;font-weight:500;background:var(--sepL);color:var(--sec);border:2px solid transparent}
#app>div{animation:fadeIn .2s ease}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(prefers-color-scheme:dark){html,body{background:#F2F2F7!important;color:#1C1C1E!important}input,textarea,select{background:#FFFFFF!important;color:#1C1C1E!important;border-color:#D1D1D6!important}.s-card,.o-card,.hcard,.modal,.imp-panel,.o-import,.rx-form-card{background:#FFFFFF!important;color:#1C1C1E!important}.nav{background:linear-gradient(135deg,#1B6B4A,#2D9D6F)!important}.search-box input{background:#FFFFFF!important;color:#1C1C1E!important}.o-stat-item{background:#FFFFFF!important;color:#1C1C1E!important}.prog-box{background:#FAFAFA!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const RX_KEY='pharmacy-v2',ORD_KEY='drug-orders-v1';
function loadRx(){try{return JSON.parse(localStorage.getItem(RX_KEY))||[];}catch{return[];}}
function saveRx(a){localStorage.setItem(RX_KEY,JSON.stringify(a));}
function loadOrd(){try{return JSON.parse(localStorage.getItem(ORD_KEY))||[];}catch{return[];}}
function saveOrd(a){localStorage.setItem(ORD_KEY,JSON.stringify(a));}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function now(){const d=new Date();return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmt(d){if(!d)return'';const t=new Date(d);return`${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,'0')}/${String(t.getDate()).padStart(2,'0')}`;}
function fmtS(d){if(!d)return'';const t=new Date(d);return`${String(t.getMonth()+1).padStart(2,'0')}/${String(t.getDate()).padStart(2,'0')}`;}
function daysTo(s){if(!s)return Infinity;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(s+'T00:00:00')-t)/864e5);}
function nextRef(p){if(!p.refillSchedule?.length)return null;const u=p.usedRefills||0;return u>=p.refillSchedule.length?null:p.refillSchedule[u];}
function hasChronic(p){return(p.prescriptions||[]).some(rx=>rx.isChronic);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
const svg=(d,s=20)=>`<svg width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="${d}"/></svg>`;
const IBack=svg("M15 18l-6-6 6-6"),IPlus=svg("M12 5v14M5 12h14"),ISearch=svg("M21 21l-4.35-4.35M11 3a8 8 0 100 16 8 8 0 000-16z"),ITrash=svg("M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6",16),IEdit=svg("M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",16),IChk=`<svg width="10" height="10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`;
const SUPPLIERS=["業務","大中盤","小中盤","其他"],STATUS_ORDER=["未叫貨","已叫貨","已到貨"];
const SC={"未叫貨":{bg:"#FFEBEB",tx:"#FF3B30",dot:"#FF3B30"},"已叫貨":{bg:"#E8F0FE",tx:"#0055D4",dot:"#007AFF"},"已到貨":{bg:"#E8F8EC",tx:"#1B7A2E",dot:"#34C759"}};
const aC=['#FF3B30','#FF9500','#FFCC00','#34C759','#007AFF','#AF52DE','#FF2D55','#5AC8FA'];
function aColor(n){let h=0;for(let i=0;i<(n||'').length;i++)h=n.charCodeAt(i)+((h<<5)-h);return aC[Math.abs(h)%aC.length];}
let S={module:'home',patients:loadRx(),view:'list',sel:null,form:null,search:'',showImp:false,impTxt:'',impMsg:'',isReview:false,delTarget:null,undoStack:[],orders:loadOrd(),oView:'list',oEdit:null,oSearch:'',oFilterSup:'全部',oFilterStat:'全部',oShowFilter:false,oImportMode:false,oExpanded:{}};
function persistRx(a){S.undoStack.push(JSON.stringify(S.patients));if(S.undoStack.length>20)S.undoStack.shift();S.patients=a;saveRx(a);render();}
if(!S.ordUndoStack)S.ordUndoStack=[];
function persistOrd(a){S.ordUndoStack.push(JSON.stringify(S.orders));if(S.ordUndoStack.length>20)S.ordUndoStack.shift();S.orders=a;saveOrd(a);render();}
function ordUndo(){if(!S.ordUndoStack||!S.ordUndoStack.length){showToast('沒有可復原的操作');return;}const prev=JSON.parse(S.ordUndoStack.pop());S.orders=prev;saveOrd(prev);[...new Set(prev.map(i=>i.name))].forEach(n=>recalcChain(n));showToast('已復原');render();}
function rBadge(p){if(!hasChronic(p))return'';const n=nextRef(p);if(!n)return`<span class="refill-pill" style="color:var(--lb);background:var(--sepL)">已領完</span>`;const d=daysTo(n.startDate);if(d<0)return`<span class="refill-pill" style="color:var(--red);background:var(--redBg)">可領藥中</span>`;if(d<=3)return`<span class="refill-pill" style="color:var(--orange);background:var(--orangeBg)">${d===0?'今天可領':d+'天後可領'}</span>`;return`<span class="refill-pill" style="color:var(--green);background:var(--greenBg)">${d}天後可領</span>`;}
function cBadge(m){if(!m)return'';if(m==='line')return`<span class="badge" style="background:#06C755;color:#fff">LINE</span>`;if(m==='phone')return`<span class="badge" style="background:var(--blueBg);color:var(--blue)">電話</span>`;if(m==='both')return`<span class="badge" style="background:#06C755;color:#fff">LINE</span> <span class="badge" style="background:var(--blueBg);color:var(--blue)">電話</span>`;return'';}
function tl(p){if(!p.refillSchedule?.length)return'';const used=p.usedRefills||0;const nw=new Date();nw.setHours(0,0,0,0);let h='<div style="margin-top:10px">';p.refillSchedule.forEach((s,i)=>{const done=i<used,cur=i===used,st=new Date(s.startDate),en=s.endDate?new Date(s.endDate):null,inW=cur&&st<=nw&&(!en||nw<=en),past=cur&&en&&nw>en;const dc=done?'var(--green)':inW?'var(--red)':past?'var(--red)':cur?'var(--orange)':'var(--sepL)',db=done?'var(--green)':'#fff',ds=done?18:14,rb=inW?'var(--redBg)':past?'var(--redBg)':'transparent';h+=`<div style="display:flex;align-items:stretch;gap:10px"><div style="display:flex;flex-direction:column;align-items:center;width:20px">${i>0?`<div style="width:2px;height:6px;background:${i<=used?'var(--green)':'var(--sepL)'}"></div>`:''}<div class="tl-dot" style="width:${ds}px;height:${ds}px;background:${db};border:2.5px solid ${dc}">${done?IChk:''}</div>${i<p.refillSchedule.length-1?`<div class="tl-line" style="background:${i<used?'var(--green)':'var(--sepL)'}"></div>`:''}</div><div style="flex:1;padding:6px 10px;margin-bottom:4px;border-radius:8px;background:${rb};opacity:${done?.5:1}"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:14px;font-weight:${done?400:600};text-decoration:${done?'line-through':'none'}">第${s.refillNumber}次</span><span style="font-size:13px;color:var(--sec)">${esc(fmt(s.startDate))}${s.endDate?' — '+fmt(s.endDate):''}</span>${done?`<span style="font-size:11px;color:var(--green)">✓ 已領</span>`:''}${inW?`<span style="font-size:11px;font-weight:600;color:var(--red)">← 現在可領</span>`:''}${past?`<span style="font-size:11px;font-weight:600;color:var(--red)">逾期</span>`:''}</div></div></div>`;});return h+'</div>';}
function renderHome(){const rc=S.patients.length,urg=S.patients.filter(p=>hasChronic(p)).map(p=>{const n=nextRef(p);return n?{d:daysTo(n.startDate)}:null;}).filter(Boolean).filter(r=>r.d<=7).length,oc=S.orders.length,op=S.orders.filter(i=>i.status==='未叫貨').length,oo=S.orders.filter(i=>i.status==='已叫貨').length;return`<div><div class="home-top"><h1>藥局管理</h1></div><div class="home-cards"><div class="hcard" onclick="goModule('rx')"><div class="hcard-icon rx">📋</div><div class="hcard-body"><div class="hcard-title">慢箋管理</div><div class="hcard-desc">客人資料・處方・領藥追蹤</div>${urg?`<span class="hcard-stat" style="background:var(--orangeBg);color:var(--orange)">⚠ ${urg} 位近期需領藥</span>`:rc?`<span class="hcard-stat" style="background:var(--greenBg);color:var(--green)">${rc} 位客人</span>`:`<span class="hcard-stat" style="background:var(--sepL);color:var(--lb)">尚無資料</span>`}</div><div class="hcard-arrow">›</div></div><div class="hcard" onclick="goModule('order')"><div class="hcard-icon ord">📦</div><div class="hcard-body"><div class="hcard-title">叫貨管理</div><div class="hcard-desc">供應商・數量搭贈・進度追蹤</div>${op?`<span class="hcard-stat" style="background:var(--redBg);color:var(--red)">${op} 筆未叫貨</span>`:oo?`<span class="hcard-stat" style="background:var(--blueBg);color:var(--blue)">${oo} 筆已叫貨</span>`:oc?`<span class="hcard-stat" style="background:var(--greenBg);color:var(--green)">全部到貨</span>`:`<span class="hcard-stat" style="background:var(--sepL);color:var(--lb)">尚無資料</span>`}</div><div class="hcard-arrow">›</div></div></div></div>`;}
function goModule(m){S.module=m;if(m==='rx'){S.view='list';S.sel=null;}if(m==='order'){S.oView='list';S.oEdit=null;}render();}
function goHome(){S.module='home';render();}

lass="section"><div class="section-label"><span id="rx-count">${f.length} 位客人</span></div><div id="rx-patient-list">${f.length?`<div class="s-card">${f.map(p=>`<div class="p-item" onclick="rxDet('${p.id}')"><div class="p-avatar" style="background:${aColor(p.name)}">${esc((p.name||'?')[0])}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px">${esc(p.name)} ${cBadge(p.contactMethod)}</div><div style="font-size:13px;color:var(--lb);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((p.prescriptions||[]).map(rx=>rx.name).filter(Boolean).join('、'))||'尚無處方'}</div>${hasChronic(p)?`<div style="margin-top:3px">${rBadge(p)}</div>`:''}</div><span style="color:var(--sep);font-size:18px">›</span></div>`).join('')}</div>`:`<div style="text-align:center;padding:40px;color:var(--lb)"><div style="font-size:40px;margin-bottom:8px">${S.search?'🔍':'👋'}</div>${S.search?'找不到符合的客人':'尚無客人資料'}</div>`}</div></div></div>`;}
function renderRxDet(){const p=S.patients.find(x=>x.id===S.sel);if(!p){S.view='list';return renderRxList();}const cRx=(p.prescriptions||[]).filter(rx=>rx.isChronic),gRx=(p.prescriptions||[]).filter(rx=>!rx.isChronic),total=p.refillSchedule?.length||0,used=p.usedRefills||0,pct=total?(used/total)*100:0;return`<div><div class="nav"><button class="nav-back" onclick="S.view='list';S.sel=null;render()">${IBack} 返回</button><div class="nav-title"></div><button class="nav-btn" onclick="rxEditF('${p.id}')">編輯</button></div><div style="text-align:center;padding:16px 20px"><div class="p-avatar" style="width:72px;height:72px;font-size:28px;border-radius:50%;margin:0 auto 10px;background:${aColor(p.name)}">${esc((p.name||'?')[0])}</div><div style="font-size:22px;font-weight:700">${esc(p.name)} ${cBadge(p.contactMethod)}</div>${p.phone?`<div style="color:var(--lb);font-size:14px;margin-top:4px">${esc(p.phone)}</div>`:''}${p.notes?`<div style="color:var(--sec);font-size:13px;margin-top:4px;line-height:1.5">${esc(p.notes)}</div>`:''}</div><div class="section">${cRx.length?`<div class="section-label">慢箋藥品</div><div class="s-card">${cRx.map(rx=>`<div class="rx-block"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:15px">${esc(rx.name)}</div>${rx.dosage?`<div style="font-size:13px;color:var(--lb);margin-top:2px">${esc(rx.dosage)}</div>`:''}</div><span class="badge" style="background:var(--orangeBg);color:var(--orange)">慢箋</span></div>${rx.note?`<div style="font-size:12px;color:var(--lb);margin-top:4px">${esc(rx.note)}</div>`:''}</div>`).join('')}</div>${total>0?`<div class="prog-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:14px;font-weight:600">領藥進度</span>${rBadge(p)}</div><div style="font-size:13px;color:var(--lb);margin-bottom:4px">已領 ${used}/${total} 次</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>${tl function renderRxForm(){const f=S.form,isE=S.patients.some(p=>p.id===f.id),title=S.isReview?'確認匯入':isE?'編輯客人':'新增客人',fHC=(f.prescriptions||[]).some(rx=>rx.isChronic);const cO=[{v:'line',l:'LINE'},{v:'phone',l:'電話'},{v:'both',l:'LINE+電話'},{v:'',l:'未設定'}];return`<div><div class="nav"><button class="nav-back" onclick="S.view=S.sel?'detail':'list';S.isReview=false;render()">${IBack} 返回</button><div class="nav-title">${esc(title)}</div></div>${S.isReview?`<div style="margin:0 16px 12px;padding:12px;background:var(--orangeBg);border-radius:10px;font-size:13px;color:var(--orange);font-weight:500">👀 請檢查後儲存</div>`:''}<div style="padding:0 16px 40px"><div class="form-group"><label class="lbl">姓名</label><input class="inp" id="f-name" value="${esc(f.name)}"></div><div class="form-group"><label class="lbl">電話</label><input class="inp" id="f-phone" value="${esc(f.phone||'')}"></div><div class="form-group"><label class="lbl">聯絡方式</label><div class="contact-btns">${cO.map(o=>`<button class="contact-btn ${f.contactMethod===o.v?'on':''}" onclick="S.form.contactMethod='${o.v}';render()">${o.l}</button>`).join('')}</div></div><div class="form-group"><label class="lbl">備註</label><textarea class="inp" rows="2" style="resize:vertical" oninput="S.form.notes=this.value">${esc(f.notes||'')}</textarea></div><div class="form-group"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><label class="lbl" style="margin:0">處方藥</label><button class="btn-ghost" onclick="S.form.prescriptions.push({name:'',dosage:'',isChronic:false,note:''});render()">${IPlus} 新增</button></div>${(f.prescriptions||[]).map((rx,i)=>`<div class="rx-form-card"><button onclick="S.form.prescriptions.splice(${i},1);render()" style="position:absolute;top:8px;right:8px;background:none;color:var(--red);opacity:.5;padding:4px">${ITrash}</button><div class="row2" style="margin-bottom:8px"><div><label class="lbl">藥品名稱</label><input class="inp" value="${esc(rx.name||'')}" oninput="S.form.prescriptions[${i}].name=this.value"></div><div><label class="lbl">用法用量</label><input class="inp" value="${esc(rx.dosage||'')}" oninput="S.form.prescriptions[${i}].dosage=this.value"></div></div><label style="font-size:13px;color:var(--sec);display:flex;align-items:center;gap:6px;margin-bottom:8px"><input type="checkbox" ${rx.isChronic?'checked':''} onchange="S.form.prescriptions[${i}].isChronic=this.checked;render()"> 慢箋</label><div><label class="lbl">備註</label><input class="inp" value="${esc(rx.note||'')}" oninput="S.form.prescriptions[${i}].note=this.value"></div></div>`).join('')}</div>${fHC?`<div class="form-group"><div style="padding:14px;background:var(--greenBg);border-radius:12px"><div style="font-size:14px;font-weight:600;color:var(--green);margin-bottom:8px">慢箋領藥區間</div>${(f.refillSchedule||[]).map((sc,si)=>`<div class="sched-row"><span style="font-size:13px;font-weight:500;color:var(--sec);min-width:40px">第${sc.refillNumber}次</span><input type="date" class="inp" style="flex:1;padding:8px;font-size:13px" value="${esc(sc.startDate||'')}" onchange="S.form.refillSchedule[${si}].startDate=this.value"><span style="color:var(--lb)">~</span><input type="date" class="inp" style="flex:1;padding:8px;font-size:13px" value="${esc(sc.endDate||'')}" onchange="S.form.refillSchedule[${si}].endDate=this.value"><button onclick="S.form.refillSchedule.splice(${si},1);S.form.refillSchedule=S.form.refillSchedule.map((x,i)=>({...x,refillNumber:i+1}));render()" style="background:none;color:var(--red);opacity:.5;padding:2px">${ITrash}</button></div>`).join('')}<button onclick="S.form.refillSchedule.push({refillNumber:S.form.refillSchedule.length+1,startDate:'',endDate:''});render()" class="btn-ghost" style="margin-top:4px;font-size:13px">${IPlus} 新增區間</button><div style="margin-top:8px"><label class="lbl">已領次數</label><input type="number" class="inp" style="width:80px" value="${f.usedRefills||0}" min="0" onchange="S.form.usedRefills=parseInt(this.value)||0"></div></div></div>`:''}<button class="save-btn" onclick="rxSave()">${S.isReview?'確認儲存':'儲存'}</button></div></div>`;}
function rxNew(){S.form={id:uid(),name:'',phone:'',contactMethod:'',prescriptions:[],notes:'',refillSchedule:[],usedRefills:0};S.view='form';S.isReview=false;render();}
function rxDet(id){S.view='detail';S.sel=id;render();}
function rxEditF(id){S.form=JSON.parse(JSON.stringify(S.patients.find(x=>x.id===id)));S.view='form';S.isReview=false;render();}
function rxMark(pid){persistRx(S.patients.map(p=>p.id!==pid?p:{...p,usedRefills:(p.usedRefills||0)+1}));S.sel=pid;showToast('✓ 已標記領藥');}
function rxSave(){const ne=document.getElementById('f-name'),pe=document.getElementById('f-phone');if(ne)S.form.name=ne.value;if(pe)S.form.phone=pe.value;const ta=document.querySelector('textarea');if(ta)S.form.notes=ta.value;if(!S.form.name.trim()){showToast('請輸入姓名');return;}const ex=S.patients.some(p=>p.id===S.form.id);persistRx(ex?S.patients.map(p=>p.id===S.form.id?S.form:p):[...S.patients,S.form]);showToast('已儲存');S.sel=S.form.id;S.view='detail';S.isReview=false;render();}
function rxImp(){const el=document.getElementById('imp-txt');let t=(el?el.value:S.impTxt).trim();S.impTxt=t;try{const m=t.match(/`(?:json)?\s*([\s\S]*?)`/);if(m)t=m[1].trim();const data=JSON.parse(t),entries=Array.isArray(data)?data:[data];if(!entries.length||!entries[0].name)throw 0;const e=entries[0];let sch=e.refillSchedule||[],ur=e.usedRefills||0;if(!sch.length){const fc=(e.prescriptions||[]).find(rx=>rx.isChronic&&rx.refillSchedule?.length);if(fc){sch=fc.refillSchedule;ur=fc.usedRefills||0;}}const fo={id:uid(),name:e.name,phone:e.phone||'',contactMethod:e.contactMethod||'',notes:e.notes||'',refillSchedule:sch.map(s=>({refillNumber:s.refillNumber,startDate:s.startDate||'',endDate:s.endDate||''})),usedRefills:ur,prescriptions:(e.prescriptions||[]).map(rx=>({name:rx.name||'',dosage:rx.dosage||'',isChronic:rx.isChronic||false,note:rx.note||''}))};const ex=S.patients.find(p=>p.name.trim()===e.name.trim());if(ex){S._pendingImport=fo;S._pendingImportOld=ex;const oldRx=(ex.prescriptions||[]).map(rx=>rx.name).join('、')||'無';const newRx=(fo.prescriptions||[]).map(rx=>rx.name).join('、')||'無';document.getElementById('imp-dup-modal')?.remove();document.body.insertAdjacentHTML('beforeend','<div class="overlay" id="imp-dup-modal"><div class="modal" onclick="event.stopPropagation()"><h3 style="font-size:17px;font-weight:600;margin-bottom:8px">「'+esc(e.name)+'」已存在</h3><p style="font-size:14px;color:var(--sec);margin-bottom:6px">舊處方：'+esc(oldRx)+'</p><p style="font-size:14px;color:var(--sec);margin-bottom:18px">新處方：'+esc(newRx)+'</p><div style="display:flex;flex-direction:column;gap:8px"><button class="btn-blue" style="width:100%" onclick="rxImpOverwrite()">覆蓋（更新處方和時程）</button><button class="btn-gray" style="width:100%" onclick="rxImpAddNew()">新增（保留舊的另建新的）</button><button class="btn-ghost" style="width:100%" onclick="document.getElementById(\'imp-dup-modal\').remove()">取消</button></div></div></div>');return;}S.form=fo;S.view='form';S.isReview=true;S.showImp=false;S.impTxt='';S.impMsg='';render();}catch(err){S.impMsg='格式錯誤：'+err;render();}}
function rxImpOverwrite(){const fo=S._pendingImport,ex=S._pendingImportOld;if(!fo||!ex)return;document.getElementById('imp-dup-modal')?.remove();fo.id=ex.id;fo.phone=fo.phone||ex.phone;fo.contactMethod=ex.contactMethod||fo.contactMethod;fo.notes=fo.notes||ex.notes;S.form=fo;S.view='form';S.isReview=true;S.showImp=false;S.impTxt='';S.impMsg='';S._pendingImport=null;S._pendingImportOld=null;render();}

function rxConfDel(id){S.delTarget=id;const p=S.patients.find(x=>x.id===id);document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="del-modal" onclick="rxCanDel()"><div class="modal" onclick="event.stopPropagation()"><h3 style="font-size:17px;font-weight:600;margin-bottom:8px">確定刪除？</h3><p style="font-size:14px;color:var(--sec);margin-bottom:18px">「${esc(p?.name||'')}」的資料將被刪除</p><div style="display:flex;gap:10px"><button class="btn-gray" style="flex:1" onclick="rxCanDel()">取消</button><button class="btn-blue" style="flex:1;background:var(--red)" onclick="rxExDel()">刪除</button></div></div></div>`);}

function ordCSV(){
  const h=["藥品名稱","健保碼","劑量","管制藥","供應商","原庫存","叫貨量","單位","每單位顆數","總顆數","搭贈","總庫存","叫貨狀態","訂藥日期","建檔日期","備註"];
  const rows=S.orders.map(i=>{const cs=i.currentStock!=null?i.currentStock:'';return[i.name,i.nhCode||'',i.dosage||'',i.controlled?'是':'',i.supplier,i.stock||'',i.qty,i.unit||'',i.perUnit||'',i.totalQty||'',i.bonus||'',cs,i.status,i.orderDate||'',i.createdAt||'',i.note||''];});
  const bom="\uFEFF";
  const csv=bom+[h,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  try{
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='藥品叫貨.csv';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    showToast('已匯出 CSV');
  }catch(e){
    // Fallback: open in new window
    const w=window.open('','_blank');
    if(w){w.document.write('<pre>'+csv.replace(/</g,'&lt;')+'</pre>');w.document.title='藥品叫貨.csv';}
    else{showToast('請允許彈出視窗');}
  }
}
function ordParse(text){try{const p=JSON.parse(text),a=Array.isArray(p)?p:[p];return a.map(x=>({id:uid(),name:x.name||x["藥品名稱"]||'',nhCode:x.nhCode||x["健保碼"]||'',dosage:x.dosage||x["劑量"]||'',controlled:x.controlled||x["管制藥"]||false,supplier:x.supplier||x["供應商"]||'其他',qty:String(x.qty||x["叫貨量"]||''),bonus:String(x.bonus||x["搭贈"]||''),stock:String(x.stock||x["庫存"]||x["原庫存"]||''),status:x.status||x["叫貨狀態"]||'未叫貨',note:x.note||x["備註"]||'',createdAt:now(),updatedAt:now()}));}catch{}return text.trim().split("\n").filter(l=>l.trim()).map(l=>{const c=l.split(/[,\t]/).map(s=>s.trim().replace(/^"|"$/g,''));return c[0]?{id:uid(),name:c[0],supplier:c[1]||'其他',qty:c[2]||'',bonus:c[3]||'',status:c[4]||'未叫貨',note:c[5]||'',createdAt:now(),updatedAt:now()}:null;}).filter(Boolean);}
function ordGetHistory(name){return S.orders.filter(i=>i.name===name&&i.status==='已到貨').sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));}
function ordLatestStock(name){const hist=ordGetHistory(name);return hist.length&&hist[0].currentStock!=null?hist[0].currentStock:null;}
// Group orders by drug name
function ordGrouped(list){const map={};list.forEach(i=>{const k=i.name;if(!map[k])map[k]=[];map[k].push(i);});return Object.entries(map).map(([name,items])=>{items.sort((a,b)=>(parseInt(b._origStock!=null?b._origStock:b.stock)||0)-(parseInt(a._origStock!=null?a._origStock:a.stock)||0));const latest=items[0];const isControlled=items.some(i=>i.controlled);return{name,isControlled,latest,items};}).sort((a,b)=>(parseInt(a.latest.stock)||0)-(parseInt(b.latest.stock)||0));}
function renderOrdList(){
  const f=S.orders.filter(i=>{if(S.oSearch&&!i.name.toLowerCase().includes(S.oSearch.toLowerCase())&&!(i.note||'').toLowerCase().includes(S.oSearch.toLowerCase()))return false;if(S.oFilterSup!=='全部'&&i.supplier!==S.oFilterSup)return false;if(S.oFilterStat!=='全部'&&i.status!==S.oFilterStat)return false;return true;});
  const st={t:S.orders.length,p:S.orders.filter(i=>i.status==='未叫貨').length,o:S.orders.filter(i=>i.status==='已叫貨').length,a:S.orders.filter(i=>i.status==='已到貨').length};

  <div class="search-box">${ISearch}<input id="o-search" value="${esc(S.oSearch)}" placeholder="搜尋藥品名稱" autocomplete="off" autocorrect="off"><button id="o-search-clear" class="search-clear" style="display:${S.oSearch?'flex':'none'}" onclick="S.oSearch='';render()">✕</button></div>`;

function ordCalcTotal(){
  const qty=parseInt(document.getElementById('of-qty')?.value)||0;
  const unitEl=document.getElementById('of-unit');
  const perEl=document.getElementById('of-perunit');
  const totalEl=document.getElementById('of-totalqty');
  const perRow=document.getElementById('of-perunit-row');
  const perLabel=document.getElementById('of-perunit-label');
  const unit=unitEl?.value||'';
  const isSingle=(unit==='顆'||unit==='錠');
  // Update label
  if(perLabel)perLabel.textContent='每'+(unit||'單位')+'幾顆';
  // Handle single units (顆/錠): perUnit=1, hide row
  if(isSingle){
    if(perEl)perEl.value='1';
    if(perRow)perRow.style.display='none';
    if(totalEl)totalEl.value=qty?String(qty):'';
    S._lastUnit=unit;
  } else {
    if(perRow)perRow.style.display='flex';
    // Only clear perUnit if switching FROM 顆/錠 (auto-set 1)
    if(perEl&&(S._lastUnit==='顆'||S._lastUnit==='錠')&&perEl.value==='1')perEl.value='';
    S._lastUnit=unit;
    const per=parseInt(perEl?.value)||0;
    if(totalEl)totalEl.value=(qty&&per)?String(qty*per):'';
  }
}

function recalcChain(drugName){
  const chain=S.orders.filter(i=>i.name===drugName).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
  if(!chain.length)return;
  // Preserve each item's original manually entered stock
  chain.forEach((item,idx)=>{
    if(item._manualStock==null){
      // First item keeps its stock; non-first items default to 0 (they inherit from chain)
      item._manualStock=(idx===0)?item.stock:'0';
    }
    item._origStock=null;item.currentStock=null;item._groupCurrentStock=null;item._hasArrived=false;item._formula='';
  });
  // First item always uses its own manual stock
  let runningStock=parseInt(chain[0]._manualStock)||0;
  chain[0].stock=chain[0]._manualStock||'0';
  chain.forEach((item,idx)=>{
    if(idx===0){item._origStock=parseInt(item._manualStock)||0;}
    else{item._origStock=runningStock;}
    if(item.status==='已到貨'){
      const qtyVal=parseInt(item.totalQty)||parseInt(item.qty)||0;
      const added=qtyVal+(parseInt(item.bonus)||0);
      item.currentStock=item._origStock+added;
      runningStock=item.currentStock;
    } else {
      item.currentStock=null;
    }
  });
  const base=parseInt(chain[0]._manualStock)||0;
  let parts=[String(base)];
  chain.forEach(item=>{
    if(item.status==='已到貨'){
      const q=parseInt(item.totalQty)||parseInt(item.qty)||0,b=parseInt(item.bonus)||0;
      if(b>0)parts.push('('+q+'+'+b+')');
      else if(q>0)parts.push(String(q));
    }
  });
  const formula=parts.length>1?parts.join(' + ')+' = '+runningStock:'';
  const hasArrived=chain.some(i=>i.status==='已到貨');
  chain.forEach(item=>{
    item._groupCurrentStock=runningStock;
    item._hasArrived=hasArrived;
    item._formula=formula;
  });
}
function ordCyc(id){

  const item=S.orders.find(i=>i.id===id);
  if(item)recalcChain(item.name);
  persistOrd(S.orders);
}

    if(sibs.length>0){
      S._unitApply={name,unit,perUnit};
      document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="unit-modal"><div class="modal" onclick="event.stopPropagation()"><h3 style="font-size:17px;font-weight:600;margin-bottom:8px">套用單位設定</h3><p style="font-size:14px;color:var(--sec);margin-bottom:18px">要把「${esc(unit)} / 每${esc(unit)}${esc(perUnit)}顆」套用到「${esc(name)}」的其他 ${sibs.length} 筆紀錄嗎？</p><div style="display:flex;gap:8px"><button class="btn-blue" style="flex:1" onclick="ordApplyUnit()">全部套用</button><button class="btn-gray" style="flex:1" onclick="document.getElementById('unit-modal').remove();S._unitApply=null">不用</button></div></div></div>`);
      S.oView='list';S.oEdit=null;return;
    }
  }
  S.oView='list';S.oEdit=null;render();}
function ordApplyUnit(){
  const u=S._unitApply;if(!u)return;
  document.getElementById('unit-modal')?.remove();
  S.orders.forEach(i=>{
    if(i.name===u.name&&(!i.unit||!i.perUnit)){
      i.unit=u.unit;i.perUnit=u.perUnit;
      const q=parseInt(i.qty)||0,p=parseInt(u.perUnit)||0;
      if(q&&p)i.totalQty=String(q*p);
    }
  });
  recalcChain(u.name);
  persistOrd(S.orders);showToast('已套用到所有紀錄');
  S._unitApply=null;render();
}
function ordRenameAll(){
  const p=S._pendingSave;if(!p)return;
  document.getElementById('rename-modal')?.remove();
  S.orders=S.orders.map(i=>{
    if(i.id===p.id)return{...i,...p.data,updatedAt:now()};
    if(i.name===p.oldName)return{...i,name:p.name};
    return i;
  });
  recalcChain(p.name);
  persistOrd(S.orders);showToast('全部已更名');
  S.oView='list';S.oEdit=null;S._pendingSave=null;render();
}
function ordRenameSingle(){
  const p=S._pendingSave;if(!p)return;
  document.getElementById('rename-modal')?.remove();
  // Show modal to re-enter stock and qty
  const oldItem=S.orders.find(i=>i.id===p.id);
  document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="restock-modal" onclick="event.stopPropagation()"><div class="modal" onclick="event.stopPropagation()" style="text-align:left"><h3 style="font-size:17px;font-weight:600;margin-bottom:12px;text-align:center">「${esc(p.name)}」獨立設定</h3><div style="margin-bottom:10px"><label class="lbl">原庫存</label><input id="rs-stock" class="inp" type="number" inputmode="numeric" value="" placeholder="重新輸入庫存量"></div><div style="margin-bottom:10px"><label class="lbl">叫貨量</label><input id="rs-qty" class="inp" type="number" inputmode="numeric" value="" placeholder="重新輸入叫貨量"></div><div style="margin-bottom:10px"><label class="lbl">搭贈</label><input id="rs-bonus" class="inp" type="number" inputmode="numeric" value="" placeholder="選填"></div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn-blue" style="flex:1" onclick="ordRenameSingleConfirm()">確認</button><button class="btn-gray" style="flex:1" onclick="ordRenameSingleSkip()">沿用原數據</button></div></div></div>`);
}
function ordRenameSingleConfirm(){
  const p=S._pendingSave;if(!p)return;
  document.getElementById('restock-modal')?.remove();
  const newStock=(document.getElementById('rs-stock')?.value||'').trim();
  const newQty=(document.getElementById('rs-qty')?.value||'').trim();
  const newBonus=(document.getElementById('rs-bonus')?.value||'').trim();
  S.orders=S.orders.map(i=>{
    if(i.id===p.id){
      const updated={...i,...p.data,updatedAt:now()};
      updated.stock=newStock||'0';updated._manualStock=newStock||'0';
      if(newQty)updated.qty=newQty;if(newBonus)updated.bonus=newBonus;
      updated.currentStock=null;updated._origStock=null;updated._groupCurrentStock=null;updated._hasArrived=false;
      return updated;
    }
    // Reset _manualStock AND stock for old chain items so they recalculate fresh
    if(i.name===p.oldName){i._manualStock=null;if(i._isAutoStock)i.stock='0';}
    return i;
  });
  recalcChain(p.name);recalcChain(p.oldName);
  persistOrd(S.orders);showToast('已獨立設定');
  S.oView='list';S.oEdit=null;S._pendingSave=null;render();
}
function ordRenameSingleSkip(){
  const p=S._pendingSave;if(!p)return;
  document.getElementById('restock-modal')?.remove();
  S.orders=S.orders.map(i=>{
    if(i.id===p.id){
      const updated={...i,...p.data,updatedAt:now()};
      updated.currentStock=null;updated._origStock=null;updated._groupCurrentStock=null;updated._hasArrived=false;
      updated._manualStock=null;
      return updated;
    }
    // Reset _manualStock AND stock for old chain items so they recalculate fresh
    if(i.name===p.oldName){i._manualStock=null;if(i._isAutoStock)i.stock='0';}
    return i;
  });
  recalcChain(p.name);recalcChain(p.oldName);
  persistOrd(S.orders);showToast('已更新');
  S.oView='list';S.oEdit=null;S._pendingSave=null;render();
}

function render(){const app=document.getElementById('app'),wf=document.activeElement?.id;let h='';if(S.module==='home')h=renderHome();else if(S.module==='rx'){if(S.view==='list')h=renderRxList();else if(S.view==='detail')h=renderRxDet();else h=renderRxForm();}else{if(S.oView==='list')h=renderOrdList();else h=renderOrdForm();}app.innerHTML=h;
const si=document.getElementById('search-inp');
if(si){
  let composing=false;
  si.addEventListener('compositionstart',()=>{composing=true;});
  si.addEventListener('compositionend',function(){composing=false;S.search=this.value;rxUpdateList();});
  si.addEventListener('input',function(){if(!composing){S.search=this.value;rxUpdateList();}});
  if(wf==='search-inp'){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}
const oi=document.getElementById('o-search');
if(oi){
  let oComposing=false;
  oi.addEventListener('compositionstart',()=>{oComposing=true;});
  oi.addEventListener('compositionend',function(){oComposing=false;S.oSearch=this.value;ordUpdateList();});
  oi.addEventListener('input',function(){if(!oComposing){S.oSearch=this.value;ordUpdateList();}});
  if(wf==='o-search'){oi.focus();oi.setSelectionRange(oi.value.length,oi.value.length);}
}
if(wf!=='search-inp'&&wf!=='o-search')window.scrollTo(0,0);
if(document.getElementById('of-qty'))setTimeout(ordCalcTotal,50);
}
function rxUpdateList(){
  const f=S.patients.filter(p=>p.name.toLowerCase().includes(S.search.toLowerCase())||(p.prescriptions||[]).some(rx=>(rx.name||'').toLowerCase().includes(S.search.toLowerCase())));
  const le=document.getElementById('rx-patient-list');
  if(le){
    le.innerHTML=f.length?`<div class="s-card">${f.map(p=>`<div class="p-item" onclick="rxDet('${p.id}')"><div class="p-avatar" style="background:${aColor(p.name)}">${esc((p.name||'?')[0])}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px">${esc(p.name)} ${cBadge(p.contactMethod)}</div><div style="font-size:13px;color:var(--lb);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((p.prescriptions||[]).map(rx=>rx.name).filter(Boolean).join('、'))||'尚無處方'}</div>${hasChronic(p)?`<div style="margin-top:3px">${rBadge(p)}</div>`:''}</div><span style="color:var(--sep);font-size:18px">›</span></div>`).join('')}</div>`:`<div style="text-align:center;padding:40px;color:var(--lb)"><div style="font-size:40px;margin-bottom:8px">${S.search?'🔍':'👋'}</div>${S.search?'找不到符合的客人':'尚無客人資料'}</div>`;
  }
  const ce=document.getElementById('rx-count');if(ce)ce.textContent=f.length+' 位客人';
  const ue=document.getElementById('rx-urgent');if(ue)ue.style.display=S.search?'none':'';
  const cl=document.getElementById('rx-search-clear');if(cl)cl.style.display=S.search?'flex':'none';
  }
function ordUpdateList(){
  const f=S.orders.filter(i=>{if(S.oSearch&&!i.name.toLowerCase().includes(S.oSearch.toLowerCase())&&!(i.note||'').toLowerCase().includes(S.oSearch.toLowerCase()))return false;if(S.oFilterSup!=='全部'&&i.supplier!==S.oFilterSup)return false;if(S.oFilterStat!=='全部'&&i.status!==S.oFilterStat)return false;return true;});
  const groups=ordGrouped(f);
  const el=document.getElementById('o-list-section');
  if(!el)return;
  let h='';
  if(!groups.length){h=`<div style="text-align:center;padding:40px;color:var(--lb)"><div style="font-size:40px;margin-bottom:8px">📦</div>${S.orders.length?'無符合結果':'尚無藥品'}</div>`;}
  else{
    groups.forEach(g=>{
      const expanded=S.oExpanded[g.name];const latest=g.latest;const histCount=g.items.length;const sc=SC[latest.status];const nameColor=g.isControlled?'var(--red)':'var(--tx)';
      const infoLine=(item)=>{const os=item._origStock!=null?item._origStock:(parseInt(item.stock)||0);const osColor=os<=5?'var(--red)':os<=10?'var(--orange)':'var(--tx)';const gc=item._groupCurrentStock;const ic=item.currentStock;return`<div style="font-size:20px;color:var(--tx);line-height:2">原庫存：<strong style="color:${osColor}">${os}</strong> · 叫貨量：<strong style="color:var(--tx)">${esc(item.qty)||'—'}${item.unit?item.unit:''}</strong>${item.perUnit?' ('+item.perUnit+'顆/'+item.unit+')':''}${item.totalQty?' = <strong style="color:var(--tx)">'+item.totalQty+'顆</strong>':''}${item.bonus?' · 搭贈：<strong style="color:var(--tx)">'+esc(item.bonus)+'</strong>':''}${ic!=null?'<br>📋 <strong style="color:var(--blue)">單筆結餘：'+String(os)+' + '+String(parseInt(item.totalQty)||parseInt(item.qty)||0)+(parseInt(item.bonus)||0?' + '+String(parseInt(item.bonus)||0):'')+' = '+String(ic)+'</strong>':''}${item._hasArrived?'<br>📦 <strong style="color:var(--green)">總庫存：'+gc+'</strong>':''}</div>`;};
      const supBadge=(sup)=>`<span class="o-badge" style="background:#F5E6D3;color:#8B5E3C">${esc(sup)}</span>`;
      const ctrlBadge=()=>g.isControlled?'<span class="o-badge" style="background:var(--redBg);color:var(--red)">⚠️ 管制藥</span>':'';
      h+=`<div class="s-card" style="margin-bottom:10px;border-radius:12px;overflow:hidden"><div class="o-card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700">1</span><span style="font-size:16px;font-weight:700;color:${nameColor}">${esc(g.name)}</span>${ctrlBadge()}</div>${latest.nhCode||latest.dosage?`<div style="font-size:13px;color:var(--sec);margin-bottom:4px">${latest.nhCode?'健保碼：'+esc(latest.nhCode):''}${latest.nhCode&&latest.dosage?' · ':''}${latest.dosage?'劑量：'+esc(latest.dosage):''}</div>`:''}<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${supBadge(latest.supplier)}${latest.bonus?`<span class="o-badge" style="background:var(--orangeBg);color:var(--orange)">搭贈 ${esc(latest.bonus)}</span>`:''}</div>${infoLine(latest)}${latest.note?`<div style="font-size:13px;color:var(--lb);margin-top:3px">${esc(latest.note)}</div>`:''}${latest.orderDate?'<div style="font-size:12px;color:var(--sec);margin-top:6px">📅 訂藥：'+latest.orderDate+'</div>':''}<div style="font-size:12px;color:var(--lb);margin-top:4px">建檔：${latest.createdAt||''}</div></div><button class="o-status-btn" style="background:${sc.bg};color:${sc.tx}" onclick="ordCyc('${latest.id}')"><span class="o-dot" style="background:${sc.dot}"></span>${latest.status}</button></div><div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--sepL)"><div style="display:flex;flex-wrap:wrap;gap:4px">${latest.status==='已到貨'?`<button class="o-action" style="color:var(--orange);font-weight:600" onclick="ordReorder('${latest.id}')">🔄 再叫貨</button>`:''}<button class="o-action" onclick="ordEd('${latest.id}')">編輯</button><button class="o-action red" onclick="ordConfirmDel('${latest.id}')">刪除</button></div>${histCount>1?`<button class="o-action" style="font-weight:600" onclick="S.oExpanded['${esc(g.name)}']=!S.oExpanded['${esc(g.name)}'];render()">${expanded?'收合 ▲':'紀錄 ('+histCount+') ▼'}</button>`:''}</div></div></div>`;
    });
  }
  el.innerHTML=h;
    const cl=document.getElementById('o-search-clear');if(cl)cl.style.display=S.oSearch?'flex':'none';
}
[...new Set(S.orders.map(i=>i.name))].forEach(n=>recalcChain(n));
render();
</script>
</body>
</html>
